<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCA Daily Reports - Spartec Consortium Africa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sca-green: #66CC33;
            --sca-yellow: #FFCC00;
            --sca-dark: #343a40;
        }

        body {
            background: linear-gradient(135deg, var(--sca-dark) 0%, #2c3e50 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            border-left: 4px solid var(--sca-green);
        }

        .report-card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(102,204,51,0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 20px;
        }

        .stat-box {
            background: rgba(102,204,51,0.1);
            border: 1px solid var(--sca-green);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--sca-green);
        }

        .btn-sca {
            background: var(--sca-green);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-sca:hover {
            background: #5cb82c;
            transform: translateY(-2px);
        }

        .table {
            color: white;
            background: rgba(255,255,255,0.05);
        }

        .table thead th {
            background: rgba(102,204,51,0.2);
            border-color: rgba(102,204,51,0.3);
            color: var(--sca-green);
        }

        .table tbody td {
            border-color: rgba(255,255,255,0.1);
        }

        .date-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--sca-green);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .date-input:focus {
            background: rgba(255,255,255,0.2);
            color: white;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>
                <i class="fas fa-chart-line"></i> Daily Attendance Reports
            </h2>
            <p class="text-muted">Spartec Consortium Africa (SCA)</p>
        </div>

        <!-- Date Selection -->
        <div class="report-card">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <label class="form-label">Select Date:</label>
                    <input type="date" class="date-input" id="reportDate">
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-sca me-2" onclick="generateReport()">
                        <i class="fas fa-sync-alt"></i> Generate Report
                    </button>
                    <button class="btn btn-sca" onclick="exportReport()">
                        <i class="fas fa-download"></i> Export CSV
                    </button>
                </div>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="row" id="summarySection" style="display: none;">
            <div class="col-md-4">
                <div class="stat-box">
                    <div class="stat-number" id="totalEmployees">0</div>
                    <div>Total Employees</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box">
                    <div class="stat-number" id="totalCheckIns">0</div>
                    <div>Total Check-ins</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box">
                    <div class="stat-number" id="reportDate">-</div>
                    <div>Report Date</div>
                </div>
            </div>
        </div>

        <!-- Report Table -->
        <div class="report-card" id="reportTableSection" style="display: none;">
            <h5>
                <i class="fas fa-users"></i> Attendance Details
            </h5>
            <div class="table-responsive">
                <table class="table" id="reportTable">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Employee Name</th>
                            <th>Device</th>
                            <th>Events</th>
                            <th>First Check-in</th>
                            <th>Last Check-out</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- No Data Message -->
        <div class="report-card text-center" id="noDataMessage">
            <i class="fas fa-calendar-day fa-3x text-muted mb-3"></i>
            <h5 class="text-muted">Select a date and generate report</h5>
            <p class="text-muted">Daily attendance reports will appear here</p>
        </div>

        <div class="text-center mt-4">
            <a href="/dashboard.html" class="btn btn-outline-light">
                <i class="fas fa-tachometer-alt"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Check authentication
        function checkAuth() {
            const session = localStorage.getItem('sca_session');
            if (!session) {
                window.location.href = '/login.html';
                return false;
            }
            return true;
        }

        // Get auth token
        function getAuthToken() {
            const session = localStorage.getItem('sca_session');
            if (session) {
                const sessionData = JSON.parse(session);
                return sessionData.token;
            }
            return null;
        }

        // Authenticated fetch wrapper
        async function authFetch(url, options = {}) {
            const token = getAuthToken();
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            
            return fetch(url, {
                ...options,
                headers
            });
        }

        // Check auth on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) {
                return;
            }
            
            // Set default date to today
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
        });

        async function generateReport() {
            const date = document.getElementById('reportDate').value;
            
            try {
                const response = await authFetch(`${API_BASE}/reports/daily?date=${date}`);
                const result = await response.json();
                
                if (result.success) {
                    displayReport(result.data);
                } else {
                    alert('Error generating report: ' + result.error);
                }
            } catch (error) {
                alert('Network error: ' + error.message);
            }
        }

        function displayReport(data) {
            // Show summary
            document.getElementById('summarySection').style.display = 'flex';
            document.getElementById('reportTableSection').style.display = 'block';
            document.getElementById('noDataMessage').style.display = 'none';
            
            // Update stats
            document.getElementById('totalEmployees').textContent = data.summary.total_employees;
            document.getElementById('totalCheckIns').textContent = data.summary.total_check_ins;
            document.getElementById('reportDate').textContent = data.summary.date;
            
            // Populate table
            const tbody = document.getElementById('reportTableBody');
            
            if (data.records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No attendance records for this date</td></tr>';
            } else {
                tbody.innerHTML = data.records.map(record => `
                    <tr>
                        <td>${record.employee_id}</td>
                        <td>${record.employee_name}</td>
                        <td>${record.device_name}</td>
                        <td>${record.total_events}</td>
                        <td>${formatDateTime(record.first_check_in)}</td>
                        <td>${record.last_check_out ? formatDateTime(record.last_check_out) : 'Not checked out'}</td>
                    </tr>
                `).join('');
            }
        }

        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function exportReport() {
            const date = document.getElementById('reportDate').value;
            const token = getAuthToken();
            if (token) {
                window.open(`${API_BASE}/reports/daily/export?date=${date}&token=${token}`, '_blank');
            } else {
                window.location.href = '/login.html';
            }
        }

        // Generate report on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) {
                return;
            }
            
            // Set default date to today
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
            generateReport();
        });
    </script>
</body>
</html>
