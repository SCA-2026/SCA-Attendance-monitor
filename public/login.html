<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCA Employee Login - Spartec Consortium Africa</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#66CC33">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SCA Attendance">
    <meta name="application-name" content="SCA Attendance">
    <meta name="msapplication-TileColor" content="#66CC33">
    <meta name="msapplication-config" content="/browserconfig.xml">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="sca-logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="sca-logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="sca-logo.png">
    
    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => console.log('SW registered: ', registration))
            .catch(registrationError => console.log('SW registration failed: ', registrationError));
        });
      }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sca-green: #66CC33;
            --sca-yellow: #FFCC00;
            --sca-dark: #343a40;
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-card: rgba(255,255,255,0.1);
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --border-color: rgba(255,255,255,0.2);
        }

        [data-theme="light"] {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #343a40;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .login-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-section img {
            width: 120px;
            margin-bottom: 1rem;
        }

        .logo-section h2 {
            color: var(--sca-green);
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .logo-section p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-label {
            font-weight: 500;
            color: var(--sca-dark);
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--sca-green);
            box-shadow: 0 0 0 0.2rem rgba(102, 204, 51, 0.25);
        }

        .btn-login {
            background: var(--sca-green);
            border: none;
            color: white;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 8px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #5cb82c;
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
            font-weight: bold;
        }

        .success-message {
            color: var(--sca-green);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>
    
    <div class="login-container">
        <div class="logo-section">
            <img src="sca-logo.png" alt="SCA Logo">
            <h2>Employee Login</h2>
            <p>Spartec Consortium Africa (SCA)<br>Attendance Management System</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="fas fa-user me-2"></i>Username
                </label>
                <input type="text" class="form-control" id="username" required placeholder="Enter your username">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="fas fa-lock me-2"></i>Password
                </label>
                <input type="password" class="form-control" id="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>

            <div id="errorMessage" class="error-message text-center mt-3">
                <i class="fas fa-exclamation-circle me-1"></i>
                <span id="errorText"></span>
            </div>

            <div id="successMessage" class="success-message text-center mt-3">
                <i class="fas fa-check-circle me-1"></i>
                <span id="successText"></span>
            </div>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">
                <i class="fas fa-shield-alt me-1"></i>
                System time is locked upon login for integrity verification
            </small>
        </div>

        <div class="text-center mt-3">
            <p class="mb-0">Don't have an account? <a href="/signup.html">Sign up here</a></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.className = 'fas fa-moon';
            } else {
                icon.className = 'fas fa-sun';
            }
        }

        // Initialize theme on load
        document.addEventListener('DOMContentLoaded', initTheme);

        // Check if already logged in
        const session = localStorage.getItem('sca_session');
        if (session) {
            const sessionData = JSON.parse(session);
            if (sessionData.loginTime && new Date() - new Date(sessionData.loginTime) < 24 * 60 * 60 * 1000) {
                // Redirect based on role
                if (sessionData.role === 'admin') {
                    window.location.href = '/admin-dashboard.html';
                } else {
                    window.location.href = '/employee-dashboard.html';
                }
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            
            // Hide previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        loginTime: new Date().toISOString()
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Store session data
                    const sessionData = {
                        username: username,
                        employeeId: result.data.employeeId || username,
                        employeeName: result.data.employeeName || username,
                        role: result.data.role,
                        loginTime: result.data.loginTime,
                        token: result.data.token
                    };
                    localStorage.setItem('sca_session', JSON.stringify(sessionData));
                    
                    // Show success message
                    successText.textContent = 'Login successful! Redirecting...';
                    successDiv.style.display = 'block';
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (result.data.role === 'admin') {
                            window.location.href = '/admin-dashboard.html';
                        } else {
                            window.location.href = '/employee-dashboard.html';
                        }
                    }, 1500);
                } else {
                    errorText.textContent = result.error || 'Invalid credentials. Please try again.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorText.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
