<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCA Attendance System</title>
    <meta name="theme-color" content="#00C853">
    <link rel="manifest" href="/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        :root {
            --green: #00C853;
            --green-dim: rgba(0,200,83,0.10);
            --green-mid: rgba(0,200,83,0.18);
            --gold: #F5C400;
            --red: #FF4444;
            --black: #060606;
            --surface: #0e0e0e;
            --card: #141414;
            --border: rgba(255,255,255,0.07);
            --border-g: rgba(0,200,83,0.18);
            --muted: #4a4a4a;
            --t1: #f0f0f0;
            --t2: #888;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--font);
            background: var(--black);
            color: var(--t1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── BACKGROUND ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 50%, rgba(0,200,83,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 90% 20%, rgba(245,196,0,0.04) 0%, transparent 60%),
                var(--black);
        }
        /* subtle grid */
        .bg-layer::after {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,200,83,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,83,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── CARD ── */
        .login-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            padding: 20px;
            animation: riseIn .5s cubic-bezier(.4,0,.2,1) both;
        }
        @keyframes riseIn {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border-g);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(0,200,83,0.06);
        }

        /* top accent bar */
        .card-accent {
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--gold), var(--green));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

        .card-inner { padding: 36px 36px 32px; }

        /* ── BRAND ── */
        .brand-block {
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; margin-bottom: 30px;
        }
        .brand-block img {
            height: 52px; width: auto; object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,200,83,0.2));
        }
        .brand-title {
            font-size: 22px; font-weight: 800; color: var(--t1);
            letter-spacing: -0.5px;
        }
        .brand-sub { font-size: 13px; color: var(--t2); margin-top: -6px; }

        /* ── FORM ── */
        .field { margin-bottom: 18px; }
        .field-label {
            display: flex; align-items: center; gap: 7px;
            font-size: 12px; font-weight: 700;
            letter-spacing: .8px; text-transform: uppercase;
            color: var(--t2); margin-bottom: 8px;
        }
        .field-label i { color: var(--green); font-size: 11px; width: 12px; text-align: center; }

        .field-input-wrap { position: relative; }
        .field-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px 13px 42px;
            color: var(--t1);
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }
        .field-input:focus {
            border-color: rgba(0,200,83,0.4);
            background: rgba(0,200,83,0.04);
            box-shadow: 0 0 0 3px rgba(0,200,83,0.08);
        }
        .field-input::placeholder { color: var(--muted); }
        .field-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 14px;
            pointer-events: none;
            transition: color .2s;
        }
        .field-input-wrap:focus-within .field-icon { color: var(--green); }

        /* password toggle */
        .pw-toggle {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); font-size: 14px;
            cursor: pointer; background: none; border: none;
            padding: 0; transition: color .2s;
        }
        .pw-toggle:hover { color: var(--t2); }

        /* remember me */
        .remember-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 22px;
        }
        .custom-check {
            width: 16px; height: 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: rgba(255,255,255,.04);
            cursor: pointer;
            accent-color: var(--green);
        }
        .remember-label {
            font-size: 13px; color: var(--t2); cursor: pointer;
        }

        /* ── SUBMIT BTN ── */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--green);
            color: #000;
            font-size: 14px; font-weight: 800;
            letter-spacing: .5px;
            border: none; border-radius: 10px;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s;
            display: flex; align-items: center; justify-content: center; gap: 9px;
            position: relative; overflow: hidden;
        }
        .submit-btn:hover:not(:disabled) {
            background: #00e060;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(0,200,83,.35);
        }
        .submit-btn:active:not(:disabled) { transform: scale(.98); }
        .submit-btn:disabled { opacity: .55; cursor: not-allowed; }

        /* spinner inside btn */
        .btn-spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-text-wrap { display: flex; align-items: center; gap: 8px; }

        /* ── DIVIDER ── */
        .card-footer-note {
            text-align: center;
            margin-top: 22px;
            font-size: 13px; color: var(--t2);
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .card-footer-note strong { color: var(--gold); }

        /* ── ALERT ── */
        .alert-box {
            border-radius: 9px;
            padding: 11px 14px;
            font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 9px;
            margin-bottom: 18px;
            animation: riseIn .2s ease;
        }
        .alert-box.success { background: rgba(0,200,83,.1); border: 1px solid rgba(0,200,83,.25); color: var(--green); }
        .alert-box.danger  { background: rgba(255,68,68,.1); border: 1px solid rgba(255,68,68,.25); color: var(--red); }
        .alert-box i { flex-shrink: 0; }

        /* ── SECURITY BADGE ── */
        .security-note {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 16px;
            font-size: 11px; color: var(--muted);
        }
        .security-note i { color: var(--green); font-size: 11px; }

        @media(max-width: 480px) {
            .card-inner { padding: 28px 22px 24px; }
            .login-wrap { padding: 14px; }
        }
    </style>
</head>

<script>
/* ══════════════════════════════════════════
   SCA LOGIN — CSP-compliant, backend-wired
══════════════════════════════════════════ */

document.addEventListener('DOMContentLoaded', function () {

    // ── Already logged in? Redirect ──
    const savedToken = localStorage.getItem('sca_token');
    const savedUser  = localStorage.getItem('sca_user');
    if (savedToken && savedUser) {
        try {
            const ud = JSON.parse(savedUser);
            window.location.href = ud.role === 'admin' ? '/admin.html' : '/employee.html';
            return;
        } catch(e) {
            localStorage.removeItem('sca_token');
            localStorage.removeItem('sca_user');
        }
    }

    // ── Password visibility toggle ──
    document.getElementById('pwToggle').addEventListener('click', function () {
        var inp  = document.getElementById('password');
        var icon = document.getElementById('pwToggleIcon');
        if (inp.type === 'password') {
            inp.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            inp.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    });

    // ── Submit on Enter ──
    document.getElementById('username').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('loginBtn').addEventListener('click', handleLogin);

    // ── Focus username on load ──
    document.getElementById('username').focus();
});

// ── HANDLE LOGIN ──
async function handleLogin() {
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;

    if (!username || !password) {
        showAlert('Please fill in all fields.', 'danger');
        return;
    }

    setLoading(true);

    try {
        var res  = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();

        if (data.success) {
            localStorage.setItem('sca_token', data.token);
            localStorage.setItem('sca_user',  JSON.stringify(data.user));

            // Remember me — persist flag
            if (document.getElementById('rememberMe').checked) {
                localStorage.setItem('sca_remember', '1');
            }

            showAlert('Login successful! Redirecting…', 'success');

            setTimeout(function () {
                window.location.href = data.user.role === 'admin' ? '/admin.html' : '/employee.html';
            }, 1200);
        } else {
            showAlert(data.error || 'Invalid credentials. Please try again.', 'danger');
            // Shake the card
            var card = document.querySelector('.login-card');
            card.style.animation = 'shake .4s ease';
            setTimeout(function() { card.style.animation = ''; }, 400);
        }
    } catch(err) {
        showAlert('Network error: ' + err.message, 'danger');
    } finally {
        setLoading(false);
    }
}

// ── LOADING STATE ──
function setLoading(on) {
    var btn     = document.getElementById('loginBtn');
    var txtWrap = document.getElementById('btnTextWrap');
    var spinner = document.getElementById('btnSpinner');
    btn.disabled       = on;
    txtWrap.style.display = on ? 'none'  : 'flex';
    spinner.style.display = on ? 'block' : 'none';
}

// ── ALERT ──
function showAlert(msg, type) {
    var icons = { success: 'fas fa-check-circle', danger: 'fas fa-exclamation-circle' };
    var ac = document.getElementById('alertContainer');
    ac.innerHTML =
        '<div class="alert-box ' + type + '">' +
        '<i class="' + (icons[type] || icons.danger) + '"></i>' +
        '<span>' + msg + '</span></div>';
    if (type !== 'success') {
        setTimeout(function() { ac.innerHTML = ''; }, 5000);
    }
}

// ── SHAKE KEYFRAME (injected once) ──
