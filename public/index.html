<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCA Attendance System</title>
    <meta name="description" content="Professional attendance management system with email notifications">
    <meta name="theme-color" content="#667eea">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    
    <!-- PWA Install Prompt -->
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallButton();
        });
        
        function showInstallButton() {
            const installBtn = document.getElementById('installBtn');
            if (installBtn) {
                installBtn.style.display = 'block';
            }
        }
        
        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    } else {
                        console.log('User dismissed the install prompt');
                    }
                    deferredPrompt = null;
                });
            }
        }
        
        // Attach event listener for CSP compliance
        document.addEventListener('DOMContentLoaded', () => {
            const installBtn = document.querySelector('[data-action="install-pwa"]');
            if (installBtn) {
                installBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    installApp();
                });
            }
        });
    </script>
</head>
<body>
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-gradient">
        <div class="text-center text-white">
            <div class="mb-4">
                <img src="/uploads/logo.png" alt="SCA Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="display-4 fw-bold mb-3">SCA Attendance System</h1>
                <p class="lead">Professional Attendance Management with Email Notifications</p>
            </div>
            
            <div class="row justify-content-center mt-5">
                <div class="col-md-4">
                    <div class="card bg-white text-dark">
                        <div class="card-body">
                            <h5 class="card-title mb-4">Choose Your Portal</h5>
                            
                            <div class="d-grid gap-3">
                                <a href="/login.html" class="btn btn-primary btn-lg">
                                    <i class="fas fa-sign-in-alt me-2"></i>
                                    Login
                                </a>
                                
                                <a href="/signup.html" class="btn btn-outline-primary btn-lg">
                                    <i class="fas fa-user-plus me-2"></i>
                                    Sign Up
                                </a>
                                
                                <button id="installBtn" class="btn btn-success btn-lg" style="display: none;" data-action="install-pwa">
                                    <i class="fas fa-download me-2"></i>
                                    Install App
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-5">
                <small class="opacity-75">
                    <i class="fas fa-mobile-alt me-2"></i>
                    Progressive Web App • Install on any device
                </small>
            </div>
        </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
