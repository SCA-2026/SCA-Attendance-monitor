<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Admin Dashboard Test</h1>
        <div class="alert alert-info">
            <h5>Debug Information:</h5>
            <div id="debugInfo"></div>
        </div>
        
        <div class="mt-4">
            <h5>Test Actions:</h5>
            <button class="btn btn-primary me-2" data-action="report" data-type="daily">
                <i class="fas fa-file-excel me-2"></i>Daily Report
            </button>
            <button class="btn btn-success me-2" data-action="refresh-data">
                <i class="fas fa-sync-alt me-2"></i>Refresh Data
            </button>
            <button class="btn btn-warning me-2" data-action="upload-excel">
                <i class="fas fa-file-excel me-2"></i>Import Excel
            </button>
        </div>
        
        <div class="mt-4">
            <h5>Console Output:</h5>
            <div id="consoleOutput" class="border p-3 bg-light" style="height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Capture console.log output
        const originalLog = console.log;
        const consoleOutput = document.getElementById('consoleOutput');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            consoleOutput.innerHTML += message + '<br>';
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };
        
        // Test authentication and event listeners
        document.addEventListener('DOMContentLoaded', function() {
            const debugInfo = document.getElementById('debugInfo');
            
            // Check authentication
            const token = localStorage.getItem('sca_token');
            const user = localStorage.getItem('sca_user');
            
            debugInfo.innerHTML = `
                <p><strong>Token exists:</strong> ${!!token}</p>
                <p><strong>User data exists:</strong> ${!!user}</p>
            `;
            
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    debugInfo.innerHTML += `
                        <p><strong>User Role:</strong> ${userData.role || 'undefined'}</p>
                        <p><strong>User Name:</strong> ${userData.full_name || 'undefined'}</p>
                        <p><strong>Username:</strong> ${userData.username || 'undefined'}</p>
                    `;
                } catch (error) {
                    debugInfo.innerHTML += `<p class="text-danger"><strong>Error parsing user data:</strong> ${error.message}</p>`;
                }
            }
            
            // Attach event listeners
            const elements = document.querySelectorAll('[data-action]');
            debugInfo.innerHTML += `<p><strong>Elements with data-action:</strong> ${elements.length}</p>`;
            
            elements.forEach((el, index) => {
                el.addEventListener('click', (e) => {
                    console.log(`Clicked element ${index}:`, el.getAttribute('data-action'));
                    e.preventDefault();
                    const action = el.getAttribute('data-action');
                    const dataType = el.getAttribute('data-type');
                    
                    console.log('Action clicked:', action, 'Type:', dataType);
                    
                    switch(action) {
                        case 'report':
                            console.log('Generating report:', dataType);
                            alert('Report generation: ' + dataType);
                            break;
                        case 'refresh-data':
                            console.log('Refreshing data');
                            alert('Refreshing data');
                            break;
                        case 'upload-excel':
                            console.log('Opening Excel upload');
                            alert('Opening Excel upload');
                            break;
                    }
                });
            });
        });
    </script>
</body>
</html>
